name: Keep GitHub Profile Active (Daily Update)

on:
  schedule:
    # Run at 00:00 UTC every day
    - cron: '0 0 * * *'
  # Allow manual trigger
  workflow_dispatch:

permissions:
  contents: write

jobs:
  daily_update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: stealth-ping

      - name: Make Daily Update
        run: |
          # Configure Git
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # Create or update a hidden file to track daily pings
          echo "Last ping: $(date)" > .keep_active
          
          # Check if there are changes
          if git diff --quiet .keep_active; then
            echo "No changes to commit."
            exit 0
          fi
          
          # Commit and Push
          git add .keep_active
          git commit -m "chore: daily activity ping [skip ci]"
          git push origin stealth-ping
